services:
  server:
    image: standardnotes/server
    container_name: standardnotes-server
    env_file: .env
    restart: unless-stopped
    ports:
      - "${STANDARDNOTES_SERVER_PORT:-3004}:3000"
      - "${STANDARDNOTES_WS_PORT:-3129}:3104"
    volumes:
      - ./logs:/var/lib/server/logs
      - ./uploads:/opt/server/packages/files/dist/uploads
    depends_on:
      - db
      - cache
      - localstack
    networks:
      - standardnotes_self_hosted

  web:
    image: standardnotes/web:latest
    container_name: standardnotes-web
    restart: unless-stopped
    ports:
      - "${STANDARDNOTES_WEB_PORT:-3007}:80"
    volumes:
      - ./web/index.html:/usr/share/nginx/html/index.html:ro
      - ./web/config.js:/usr/share/nginx/html/config.js:ro
    depends_on:
      - server
    networks:
      - standardnotes_self_hosted

  localstack:
    image: localstack/localstack:3.0
    container_name: standardnotes-localstack
    restart: unless-stopped
    environment:
      - SERVICES=sns,sqs
      - HOSTNAME_EXTERNAL=localstack
      - LS_LOG=warn
    volumes:
      - ./localstack_bootstrap.sh:/etc/localstack/init/ready.d/localstack_bootstrap.sh
    networks:
      - standardnotes_self_hosted

  db:
    image: mysql:8
    container_name: standardnotes-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=standard_notes_db
      - MYSQL_USER=std_notes_user
      - MYSQL_ROOT_PASSWORD=faristest
      - MYSQL_PASSWORD=faristest
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./data/import:/docker-entrypoint-initdb.d
    networks:
      - standardnotes_self_hosted

  cache:
    image: redis:6.0-alpine
    container_name: standardnotes-cache
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks:
      - standardnotes_self_hosted

networks:
  standardnotes_self_hosted:
    name: standardnotes_self_hosted
