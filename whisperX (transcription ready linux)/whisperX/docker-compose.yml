services:
  whisperx-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: whisperx-api
    restart: unless-stopped
    ports:
      - "${WHISPERX_API_PORT:-3020}:3020"
    environment:
      - WHISPERX_DEVICE=cpu
      - WHISPERX_COMPUTE_TYPE=int8
      - WHISPERX_DEFAULT_MODEL=small
      - WHISPERX_HF_TOKEN=
      - WHISPERX_OUTPUT_DIR=/app/outputs
      - WHISPERX_MODEL_DIR=/app/models
    volumes:
      - ./outputs:/app/outputs
      - ./models:/app/models

  whisperx-web:
    image: nginx:alpine
    container_name: whisperx-web
    restart: unless-stopped
    ports:
      - "${WHISPERX_WEB_PORT:-3030}:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - whisperx-api
