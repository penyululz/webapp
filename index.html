<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <title>Webapp Control Center</title>
    <meta
      name="description"
      content="A React and Vite launcher dashboard for the apps stored in F:\\webapp."
    />
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
        background: #050505;
        color: #f5f5f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(54, 135, 96, 0.35), transparent 28%),
          radial-gradient(circle at bottom right, rgba(220, 184, 112, 0.18), transparent 24%),
          #050505;
      }

      .boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .boot-card {
        width: min(720px, 100%);
        padding: 32px;
        border: 1px solid rgba(245, 245, 240, 0.14);
        border-radius: 24px;
        background: rgba(8, 8, 8, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      .boot-kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #8fbfa7;
      }

      .boot-kicker::before {
        content: "";
        width: 40px;
        height: 1px;
        background: currentColor;
      }

      .boot-card h1 {
        margin: 18px 0 14px;
        font-size: clamp(36px, 7vw, 68px);
        line-height: 0.96;
        letter-spacing: -0.04em;
      }

      .boot-card p {
        margin: 0 0 18px;
        color: rgba(245, 245, 240, 0.78);
        line-height: 1.7;
      }

      .boot-list {
        margin: 0;
        padding-left: 18px;
        color: rgba(245, 245, 240, 0.92);
        line-height: 1.8;
      }

      .boot-code {
        margin-top: 20px;
        padding: 16px 18px;
        border-radius: 16px;
        background: rgba(245, 245, 240, 0.06);
        color: #dfe6df;
        font-family: Consolas, "Courier New", monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      if (window.location.protocol === "file:") {
        document.getElementById("root").innerHTML = `
          <main class="boot-screen">
            <section class="boot-card">
              <span class="boot-kicker">Portfolio brand launcher</span>
              <h1>Start The Portal Through Vite</h1>
              <p>
                This homepage is a React + Vite app, so opening <strong>index.html</strong> directly
                from the folder will not boot the dashboard correctly.
              </p>
              <ul class="boot-list">
                <li>Run <strong>F:\\webapp\\start-hub.bat</strong></li>
                <li>Or run <strong>cmd /c npm run dev</strong> inside <strong>F:\\webapp</strong></li>
                <li>Then open <strong>http://127.0.0.1:5173</strong></li>
              </ul>
              <div class="boot-code">start-hub.bat
http://127.0.0.1:5173</div>
            </section>
          </main>
        `;
      } else {
        import("/src/main.jsx");
      }
    </script>
  </body>
</html>
